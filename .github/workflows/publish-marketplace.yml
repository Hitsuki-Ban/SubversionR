name: Publish Marketplace Prerelease

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub prerelease tag allowed by the source-controlled candidate attestation contract
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: marketplace-prerelease-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: marketplace
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      GH_TOKEN: ${{ github.token }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate public main dispatch and candidate attestation contract
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest

          if ($env:GITHUB_REPOSITORY -ne "Hitsuki-Ban/SubversionR") {
            throw "Marketplace publication must run in the public Hitsuki-Ban/SubversionR repository."
          }
          if ($env:GITHUB_REF -ne "refs/heads/main") {
            throw "Marketplace publication must be dispatched from public main."
          }
          if ($env:GITHUB_EVENT_NAME -ne "workflow_dispatch") {
            throw "Marketplace publication requires workflow_dispatch."
          }

          $contractPath = "docs/release/github-attestation-candidate-contract.win32-x64.json"
          $contract = Get-Content -Raw -LiteralPath $contractPath | ConvertFrom-Json
          if ([string]$contract.schema -ne "subversionr.release.github-attestation-contract.win32-x64.v1") {
            throw "Candidate attestation contract schema must match the Marketplace publication contract."
          }
          if ($contract.publicReadinessClaim -isnot [bool] -or $contract.publicReadinessClaim) {
            throw "Candidate attestation contract publicReadinessClaim must be the JSON boolean false."
          }
          if ([string]$contract.status -ne "pending-release-attestation" -or
              $contract.subject.preReleaseProperty -isnot [bool] -or -not $contract.subject.preReleaseProperty) {
            throw "Candidate attestation contract must remain pending and pre-release eligible."
          }
          if ([string]$contract.target -ne "win32-x64") {
            throw "Candidate attestation contract target must be win32-x64."
          }
          if ($env:RELEASE_TAG -ne [string]$contract.release.tag) {
            throw "release_tag must exactly match the source-controlled candidate attestation contract."
          }
          $subjectName = [string]$contract.subject.name
          if ($subjectName -notmatch '^[A-Za-z0-9._-]+\.vsix$') {
            throw "Candidate attestation subject name must be a safe VSIX leaf name."
          }

          $policy = $contract.verificationPolicy
          if ([string]$policy.repository -ne "Hitsuki-Ban/SubversionR" -or
              [string]$policy.signerWorkflow -ne "Hitsuki-Ban/SubversionR/.github/workflows/attest-release-vsix.yml" -or
              [string]$policy.predicateType -ne "https://github.com/Hitsuki-Ban/SubversionR/attestations/post-release-asset/v1" -or
              $policy.denySelfHostedRunners -isnot [bool] -or -not $policy.denySelfHostedRunners -or
              [string]$policy.format -ne "json") {
            throw "Candidate attestation verification policy must match the public release policy."
          }

          $subjectRoot = "target/marketplace-publication/win32-x64"
          $subjectPath = "$subjectRoot/$subjectName"
          $verificationResultPath = "$subjectRoot/gh-attestation-verification.json"
          New-Item -ItemType Directory -Force -Path $subjectRoot | Out-Null
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "ATTESTATION_CONTRACT_PATH=$contractPath"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "ATTESTATION_REPOSITORY=$($policy.repository)"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "ATTESTATION_SIGNER_WORKFLOW=$($policy.signerWorkflow)"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "ATTESTATION_PREDICATE_TYPE=$($policy.predicateType)"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "ATTESTATION_VERIFICATION_RESULT_PATH=$verificationResultPath"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "SUBJECT_NAME=$subjectName"
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "SUBJECT_PATH=$subjectPath"

      - name: Download exact candidate release VSIX
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          gh release download $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --pattern $env:SUBJECT_NAME --dir (Split-Path -Parent $env:SUBJECT_PATH)
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download the contracted candidate release VSIX."
          }
          if (-not (Test-Path -LiteralPath $env:SUBJECT_PATH -PathType Leaf)) {
            throw "The contracted candidate release VSIX was not downloaded."
          }

      - name: Verify exact candidate VSIX bytes
        shell: pwsh
        run: >
          pwsh -NoProfile -ExecutionPolicy Bypass
          -File scripts/release/verify-release-attestation-subject.ps1
          -Target win32-x64
          -ContractPath $env:ATTESTATION_CONTRACT_PATH
          -SubjectPath $env:SUBJECT_PATH
          -ReleaseTag $env:RELEASE_TAG

      - name: Require packaged Marketplace prerelease property
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-StrictMode -Version Latest
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $archive = [System.IO.Compression.ZipFile]::OpenRead($env:SUBJECT_PATH)
          try {
            $manifestEntries = @($archive.Entries | Where-Object { $_.FullName -ceq "extension.vsixmanifest" })
            if ($manifestEntries.Count -ne 1) {
              throw "VSIX must contain exactly one extension.vsixmanifest."
            }
            $reader = [System.IO.StreamReader]::new($manifestEntries[0].Open())
            try {
              [xml]$manifest = $reader.ReadToEnd()
            }
            finally {
              $reader.Dispose()
            }
          }
          finally {
            $archive.Dispose()
          }

          $properties = @($manifest.SelectNodes("//*[local-name()='PackageManifest']/*[local-name()='Metadata']/*[local-name()='Properties']/*[local-name()='Property' and @Id='Microsoft.VisualStudio.Code.PreRelease']"))
          if ($properties.Count -ne 1 -or [string]$properties[0].Value -cne "true") {
            throw "The exact candidate VSIX is not packaged as a Marketplace prerelease; refusing Azure login and publication."
          }

          $identities = @($manifest.SelectNodes("//*[local-name()='PackageManifest']/*[local-name()='Metadata']/*[local-name()='Identity']"))
          if ($identities.Count -ne 1) {
            throw "VSIX must contain exactly one Marketplace identity."
          }
          $identity = $identities[0]
          if ([string]$identity.Id -cne "subversionr" -or [string]$identity.Publisher -cne "hitsuki-ban" -or [string]$identity.TargetPlatform -cne "win32-x64") {
            throw "VSIX Marketplace identity must be hitsuki-ban.subversionr for win32-x64."
          }
          $extensionVersion = [string]$identity.Version
          if ($extensionVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "VSIX Marketplace version must be an exact three-part numeric version."
          }
          Add-Content -LiteralPath $env:GITHUB_ENV -Value "EXTENSION_VERSION=$extensionVersion"

      - name: Verify live GitHub attestation for candidate VSIX
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $verification = gh attestation verify $env:SUBJECT_PATH -R $env:ATTESTATION_REPOSITORY --signer-workflow $env:ATTESTATION_SIGNER_WORKFLOW --signer-digest $env:GITHUB_SHA --source-ref refs/heads/main --source-digest $env:GITHUB_SHA --predicate-type $env:ATTESTATION_PREDICATE_TYPE --deny-self-hosted-runners --format json
          if ($LASTEXITCODE -ne 0) {
            throw "Live GitHub attestation verification failed for the candidate VSIX."
          }
          $verification | Set-Content -LiteralPath $env:ATTESTATION_VERIFICATION_RESULT_PATH -Encoding utf8
          Get-Content -Raw -LiteralPath $env:ATTESTATION_VERIFICATION_RESULT_PATH | ConvertFrom-Json | Out-Null

      - name: Validate required Entra variables
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if ([string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_ID)) {
            throw "Marketplace environment variable AZURE_CLIENT_ID is required."
          }
          if ([string]::IsNullOrWhiteSpace($env:AZURE_TENANT_ID)) {
            throw "Marketplace environment variable AZURE_TENANT_ID is required."
          }

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.5.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install locked publishing toolchain
        run: pnpm install --frozen-lockfile

      - name: Verify locked vsce supports Entra credentials
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $package = Get-Content -Raw -LiteralPath package.json | ConvertFrom-Json
          $configuredVersion = [string]$package.devDependencies."@vscode/vsce"
          try {
            $parsedVersion = [version]$configuredVersion
          }
          catch {
            throw "@vscode/vsce must be pinned to an exact numeric version."
          }
          if ($parsedVersion -lt [version]"2.26.1") {
            throw "@vscode/vsce must be at least 2.26.1 for --azure-credential."
          }
          $installedVersion = (pnpm exec vsce --version).Trim()
          if ($LASTEXITCODE -ne 0 -or $installedVersion -ne $configuredVersion) {
            throw "Installed vsce version must match the locked root dependency."
          }

      - name: Azure login with federated Marketplace identity
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish exact VSIX as Marketplace prerelease
        shell: pwsh
        run: pnpm exec vsce publish --packagePath $env:SUBJECT_PATH --pre-release --azure-credential

      - name: Record Marketplace publication evidence
        shell: pwsh
        run: >
          pwsh -NoProfile -ExecutionPolicy Bypass
          -File scripts/release/record-marketplace-publication.ps1
          -Target win32-x64
          -ContractPath $env:ATTESTATION_CONTRACT_PATH
          -AttestationVerificationResultPath $env:ATTESTATION_VERIFICATION_RESULT_PATH
          -VsixPath $env:SUBJECT_PATH
          -ReleaseTag $env:RELEASE_TAG
          -ExtensionId hitsuki-ban.subversionr
          -ExtensionVersion $env:EXTENSION_VERSION
          -Repository $env:GITHUB_REPOSITORY
          -WorkflowPath .github/workflows/publish-marketplace.yml
          -RunId $env:GITHUB_RUN_ID
          -RunAttempt $env:GITHUB_RUN_ATTEMPT
          -RunUrl "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          -HeadSha $env:GITHUB_SHA
          -SourceRef $env:GITHUB_REF
          -EventName $env:GITHUB_EVENT_NAME
          -OutputPath target/release-evidence/subversionr-marketplace-publication-win32-x64.json

      - name: Upload Marketplace publication evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: subversionr-marketplace-publication-win32-x64
          if-no-files-found: error
          path: |
            target/marketplace-publication/win32-x64/gh-attestation-verification.json
            target/release-evidence/subversionr-marketplace-publication-win32-x64.json
